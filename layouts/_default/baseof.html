<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
    <meta name="description" content="{{ .Site.Params.description }}">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d1117;color:#c9d1d9;line-height:1.7;max-width:800px;margin:0 auto;padding:2rem 1.5rem}
        a{color:#58a6ff;text-decoration:none}
        a:hover{text-decoration:underline}
        header{border-bottom:1px solid #30363d;padding-bottom:1rem;margin-bottom:2rem}
        header h1{font-size:2rem;color:#f0f6fc}
        header h1 a{color:#f0f6fc}
        header p{color:#8b949e;margin-top:.5rem;font-size:.9rem}
        nav{margin-top:1rem}
        nav a{margin-right:1.5rem;font-weight:500}
        article{margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid #21262d}
        article h2{font-size:1.5rem;margin-bottom:.5rem}
        article h2 a{color:#f0f6fc}
        article time{color:#8b949e;font-size:.85rem;display:block;margin:.5rem 0}
        article .summary{color:#8b949e;margin-top:.5rem}
        .tags{margin-top:.5rem}
        .tags span{background:#21262d;color:#58a6ff;padding:.15rem .6rem;border-radius:12px;font-size:.8rem;margin-right:.4rem}
        footer{text-align:center;color:#484f58;padding:2rem 0;font-size:.85rem}
        footer a{color:#484f58}
        .post-content h2{margin:1.5rem 0 .5rem;color:#f0f6fc}
        .post-content p{margin:.8rem 0}
        .post-content ul,.post-content ol{margin:.5rem 0 .5rem 1.5rem}
        .post-content code{background:#161b22;padding:.15rem .4rem;border-radius:4px}
        .post-content blockquote{border-left:3px solid #58a6ff;padding-left:1rem;color:#8b949e;margin:1rem 0}
    </style>
</head>
<body>
    <header>
        <h1><a href="/">{{ .Site.Title }}</a></h1>
        <p>{{ .Site.Params.description }}</p>
        <nav>
            <a href="/">首页</a>
            <a href="https://zwiserfit.com">ZWISERFIT</a>
            <a href="https://github.com/ZWISERFIT">GitHub</a>
        </nav>
    </header>
    <main>{{ block "main" . }}{{ end }}</main>
    <footer>
        <p>ZWISERFIT · AI x Web5 x Physical · <a href="https://github.com/ZWISERFIT/blog">Blog Repo</a></p>
    </footer>
</body>
</html>
